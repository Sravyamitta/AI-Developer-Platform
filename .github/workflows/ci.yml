name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - apps/web
          - apps/api-gateway
          - services/github-service
          - services/ai-service
          - services/embeddings-service
          - services/repo-qa-service
          - packages/shared
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package first
        run: yarn workspace shared build

      - name: Typecheck ${{ matrix.workspace }}
        run: |
          cd ${{ matrix.workspace }}
          yarn typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint web
        run: yarn workspace web lint

  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: github-service
            dockerfile: services/github-service/Dockerfile
          - service: ai-service
            dockerfile: services/ai-service/Dockerfile
          - service: embeddings-service
            dockerfile: services/embeddings-service/Dockerfile
          - service: repo-qa-service
            dockerfile: services/repo-qa-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
