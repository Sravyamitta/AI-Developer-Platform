name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─── Build & Push all service images to ECR ─────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read
    strategy:
      matrix:
        include:
          - service: web
            context: apps/web
          - service: api-gateway
            context: apps/api-gateway
          - service: github-service
            context: services/github-service
          - service: ai-service
            context: services/ai-service
          - service: embeddings-service
            context: services/embeddings-service
          - service: repo-qa-service
            context: services/repo-qa-service
    outputs:
      # Each job outputs its image URI for the deploy job
      image-${{ matrix.service }}: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ai-platform-${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/ai-platform-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Output image URI
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/ai-platform-${{ matrix.service }}:${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"

  # ─── Deploy to ECS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy web
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/web.json
          service: ai-platform-web
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            web=${{ env.ECR_REGISTRY }}/ai-platform-web:${{ github.sha }}

      - name: Deploy api-gateway
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/api-gateway.json
          service: ai-platform-api-gateway
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            api-gateway=${{ env.ECR_REGISTRY }}/ai-platform-api-gateway:${{ github.sha }}

      - name: Deploy github-service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/github-service.json
          service: ai-platform-github-service
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            github-service=${{ env.ECR_REGISTRY }}/ai-platform-github-service:${{ github.sha }}

      - name: Deploy ai-service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/ai-service.json
          service: ai-platform-ai-service
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            ai-service=${{ env.ECR_REGISTRY }}/ai-platform-ai-service:${{ github.sha }}

      - name: Deploy embeddings-service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/embeddings-service.json
          service: ai-platform-embeddings-service
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            embeddings-service=${{ env.ECR_REGISTRY }}/ai-platform-embeddings-service:${{ github.sha }}

      - name: Deploy repo-qa-service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/task-defs/repo-qa-service.json
          service: ai-platform-repo-qa-service
          cluster: ai-platform
          wait-for-service-stability: false
          image-container-pair: >
            repo-qa-service=${{ env.ECR_REGISTRY }}/ai-platform-repo-qa-service:${{ github.sha }}

      - name: Wait for all services to stabilize
        run: |
          SERVICES=(
            ai-platform-web
            ai-platform-api-gateway
            ai-platform-github-service
            ai-platform-ai-service
            ai-platform-embeddings-service
            ai-platform-repo-qa-service
          )
          for svc in "${SERVICES[@]}"; do
            echo "Waiting for $svc..."
            aws ecs wait services-stable \
              --cluster ai-platform \
              --services "$svc" \
              --region ${{ env.AWS_REGION }}
          done
          echo "All services stable."
