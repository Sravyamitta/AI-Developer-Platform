name: Deploy

on:
  push:
    branches: [main]
    # Only deploy when you explicitly add [deploy] to your commit message
    # e.g. git commit -m "feat: add feature [deploy]"
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  check-secrets:
    name: Check AWS secrets are configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ] || [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "AWS secrets not configured — skipping deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: github-service
            dockerfile: services/github-service/Dockerfile
          - service: ai-service
            dockerfile: services/ai-service/Dockerfile
          - service: embeddings-service
            dockerfile: services/embeddings-service/Dockerfile
          - service: repo-qa-service
            dockerfile: services/repo-qa-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ai-platform-${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/ai-platform-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy all ECS services
        run: |
          SERVICES=(web api-gateway github-service ai-service embeddings-service repo-qa-service)
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster ai-platform \
              --service "ai-platform-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} \
              --query 'service.serviceName' \
              --output text
          done

      - name: Wait for stability
        run: |
          SERVICES=(web api-gateway github-service ai-service embeddings-service repo-qa-service)
          for svc in "${SERVICES[@]}"; do
            echo "Waiting for ai-platform-${svc}..."
            aws ecs wait services-stable \
              --cluster ai-platform \
              --services "ai-platform-${svc}" \
              --region ${{ env.AWS_REGION }}
          done
          echo "All services stable."
